name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Verify package.json
      run: |
        node -e "const pkg = require('./package.json'); console.log('Package name:', pkg.name); console.log('Version:', pkg.version); console.log('Main:', pkg.main);"

    - name: Check index.js syntax
      run: node -c index.js

    - name: Verify manifest structure
      run: |
        node -e "
          const fs = require('fs');
          const code = fs.readFileSync('index.js', 'utf8');
          const checks = [
            ['manifest object', code.includes('const manifest = {')],
            ['addonBuilder', code.includes('addonBuilder')],
            ['catalog handler', code.includes('defineCatalogHandler')],
            ['meta handler', code.includes('defineMetaHandler')],
            ['stream handler', code.includes('defineStreamHandler')],
            ['express server', code.includes('express()')],
            ['manifest.json route', code.includes('/manifest.json')],
          ];
          let allOk = true;
          checks.forEach(([name, ok]) => {
            console.log(ok ? '✓' : '✗', name);
            if (!ok) allOk = false;
          });
          if (!allOk) process.exit(1);
        "
