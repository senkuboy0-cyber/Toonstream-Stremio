name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Verify package.json
      run: |
        node -e "const pkg = require('./package.json'); console.log('Package name:', pkg.name); console.log('Version:', pkg.version); console.log('Main:', pkg.main);"

    - name: Check index.js syntax
      run: node -c index.js

    - name: Verify manifest
      run: |
        node -e "
          const fs = require('fs');
          const code = fs.readFileSync('index.js', 'utf8');
          if (code.includes('manifest') && code.includes('addonBuilder')) {
            console.log('✓ Addon manifest and builder found');
          } else {
            console.error('✗ Missing manifest or addonBuilder');
            process.exit(1);
          }
        "
